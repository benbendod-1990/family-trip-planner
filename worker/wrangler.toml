name = "family-trip-planner-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Free tier: 100k requests/day, 10ms CPU/req
workers_dev = true

# Secrets (set via `wrangler secret put <KEY>`):
#   ANTHROPIC_API_KEY — Claude API key (required)
#   SUPABASE_JWT_SECRET — only for legacy projects on HS256 (modern Supabase uses ES256/JWKS)
#   SHARED_API_SECRET — optional fallback shared secret for dev/test

# Dev-only config (loaded from .dev.vars; keep it out of git)
# For local dev, copy .dev.vars.example → .dev.vars and fill in.

[vars]
ALLOWED_ORIGIN = "http://localhost:3002,https://family-trip-planner-end.pages.dev"
SUPABASE_URL = "https://fmybfgryipzlfukirizp.supabase.co"
